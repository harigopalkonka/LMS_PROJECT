services:
  # Backend Service
  - type: web
    name: lms-erp-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Frontend Static Site
  - type: web
    name: lms-erp-frontend
    buildCommand: cd frontend && npm run build
    publishPath: frontend/out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://lms-erp-backend.onrender.com/api
      - key: NEXT_PUBLIC_FRONTEND_URL
        value: https://lms-erp-frontend.onrender.com
